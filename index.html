<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agenda Digital Escolar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style> body { font-family: 'Inter', sans-serif; background-color: #f8fafc; } </style>
</head>
<body class="text-slate-800 antialiased min-h-screen pb-12">
    <div class="max-w-4xl mx-auto px-4 pt-6">
        
<div class="flex bg-slate-200 p-1 rounded-xl mb-6 max-w-xl mx-auto">
    <button onclick="cambiarPestaña('lista')" id="tab-lista" class="flex-1 text-sm font-semibold py-2.5 rounded-lg transition-all bg-white text-slate-900 shadow-sm">📋 Lista</button>
    <button onclick="cambiarPestaña('calif')" id="tab-calif" class="flex-1 text-sm font-semibold py-2.5 rounded-lg transition-all text-slate-600 hover:text-slate-900">📝 Calificaciones</button>
    <button onclick="cambiarPestaña('agenda')" id="tab-agenda" class="flex-1 text-sm font-semibold py-2.5 rounded-lg transition-all text-slate-600 hover:text-slate-900">📅 Agenda</button>
</div>

        <div id="seccion-lista" class="space-y-4">
            <header class="bg-white rounded-2xl p-6 shadow-sm border border-slate-100 flex flex-col sm:flex-row justify-between items-center gap-4">
<div>
    <h1 class="text-xl font-bold text-slate-900 tracking-tight">Pase de Lista Diario</h1>
    <p class="text-sm font-medium text-slate-500">Ciclo Escolar 2026-2027</p>
</div>
<div class="mt-4 bg-slate-50 p-4 rounded-xl border border-slate-200/60">
    <label for="selector-grupo" class="block text-xs font-semibold text-slate-600 uppercase tracking-wider mb-2">🏫 Selecciona Escuela / Grupo:</label>
    <select id="selector-grupo" onchange="cambiarDeGrupo()" class="w-full bg-white border border-slate-200 rounded-lg p-2.5 text-sm font-medium text-slate-800 shadow-sm focus:outline-none focus:ring-2 focus:ring-emerald-500/20 focus:border-emerald-500">
        <option value="">⏳ Cargando escuelas disponibles...</option>
    </select>
</div>

<div class="mt-4">
    <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">📅 Fecha de Asistencia:</label>
    <input type="date" id="fecha" class="bg-white border border-slate-200 rounded-xl p-3 text-sm font-medium shadow-sm focus:outline-none focus:ring-2 focus:ring-emerald-500/20 focus:border-emerald-500 w-full sm:w-auto">
</div>
               
            </header>
            <main class="space-y-3" id="contenedor-alumnos"></main>
            <button onclick="enviarAsistencia()" id="btn-asistencia" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-semibold py-3.5 rounded-xl shadow-lg transition-all">🚀 Enviar Reporte a Notion</button>
        </div>

        <div id="seccion-calif" class="hidden space-y-4">
            <header class="bg-white rounded-2xl p-6 shadow-sm border border-slate-100 space-y-4">
                <h2 class="text-xl font-bold text-slate-900">Captura Masiva de Proyectos (NEM)</h2>
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-bold uppercase text-slate-400 mb-1">Nombre del Proyecto / Tarea</label>
                        <input type="text" id="nombre-proyecto" placeholder="Ej: Álbum de Rimas o Maqueta" class="w-full text-sm bg-slate-50 border border-slate-200 rounded-lg p-2.5 focus:outline-none">
                    </div>
                    <div>
                        <label class="block text-xs font-bold uppercase text-slate-400 mb-1">Trimestre Vigente</label>
                        <select id="trimestre-proyecto" class="w-full text-sm bg-slate-50 border border-slate-200 rounded-lg p-2.5 focus:outline-none">
                            <option value="Trimestre 1">Trimestre 1 (Noviembre)</option>
                            <option value="Trimestre 2">Trimestre 2 (Marzo)</option>
                            <option value="Trimestre 3">Trimestre 3 (Julio)</option>
                        </select>
                    </div>
                </div>
            </header>
            <main class="space-y-3" id="contenedor-calificaciones-masivas"></main>
            <button onclick="enviarCalificaciones()" id="btn-calif" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-3.5 rounded-xl shadow-lg transition-all">💾 Guardar Notas del Proyecto</button>
        </div>

<div id="seccion-agenda" class="hidden space-y-4">
    <div class="bg-white rounded-2xl p-6 shadow-sm border border-slate-100 space-y-4">
        <h2 class="text-xl font-bold text-slate-900">Agendar Evento o Actividad Escolar</h2>
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
            <div class="sm:col-span-2">
                <label class="block text-xs font-bold uppercase text-slate-400 mb-1">Nombre del Evento / Actividad</label>
                <input type="text" id="nombre-evento" placeholder="Ej: Junta de Consejo Técnico o Entrega de Boletas" class="w-full text-sm bg-slate-50 border border-slate-200 rounded-lg p-2.5 focus:outline-none focus:ring-2 focus:ring-purple-500/20">
            </div>
            <div>
                <label class="block text-xs font-bold uppercase text-slate-400 mb-1">Fecha del Evento</label>
                <input type="date" id="fecha-evento" class="w-full text-sm bg-slate-50 border border-slate-200 rounded-lg p-2.5 focus:outline-none">
            </div>
            <div>
                <label class="block text-xs font-bold uppercase text-slate-400 mb-1">Tipo de Evento (SEP)</label>
                <select id="tipo-evento" class="w-full text-sm bg-slate-50 border border-slate-200 rounded-lg p-2.5 focus:outline-none">
                    <option value="Actividad Escolar">🏫 Actividad Escolar</option>
                    <option value="Entrega de Boletas">📄 Entrega de Boletas</option>
                    <option value="Suspensión de Labores">🛑 Suspensión de Labores</option>
                    <option value="Vacaciones">🏖️ Vacaciones</option>
                    <option value="Inscripciones">📝 Inscripciones</option>
                    <option value="Descarga Administrativa">📊 Descarga Administrativa</option>
                    <option value="CTE">✏️ CTE</option>
                </select>
            </div>
            <div>
                <label class="block text-xs font-bold uppercase text-slate-400 mb-1">Trimestre Asociado</label>
                <select id="trimestre-evento" class="w-full text-sm bg-slate-50 border border-slate-200 rounded-lg p-2.5 focus:outline-none">
                    <option value="Trimestre 1">Trimestre 1</option>
                    <option value="Trimestre 2">Trimestre 2</option>
                    <option value="Trimestre 3">Trimestre 3</option>
                </select>
            </div>
            <div>
                <label class="block text-xs font-bold uppercase text-slate-400 mb-1">Notas / Acuerdos</label>
                <input type="text" id="notas-evento" placeholder="Detalles adicionales o acuerdos" class="w-full text-sm bg-slate-50 border border-slate-200 rounded-lg p-2.5 focus:outline-none">
            </div>
        </div>
    </div>
    <button onclick="enviarEvento()" id="btn-evento" class="w-full bg-purple-600 hover:bg-purple-700 text-white font-semibold py-3.5 rounded-xl shadow-lg transition-all">📅 Publicar Evento Escolar</button>
</div>

        
        <section class="mt-8 bg-white rounded-2xl p-6 shadow-sm border border-slate-100">
            <div class="flex items-center gap-3 mb-4"><span class="text-2xl">📊</span><h3 class="font-bold text-slate-900 text-base">Descarga de Boletas Oficiales</h3></div>
            <div class="flex flex-col sm:flex-row gap-3 items-center">
                <select id="select-trimestre" class="w-full sm:w-auto px-3 py-2 text-sm bg-slate-50 border border-slate-200 rounded-lg text-slate-700"><option value="Trimestre 1">Trimestre 1</option><option value="Trimestre 2">Trimestre 2</option><option value="Trimestre 3">Trimestre 3</option></select>
                <button id="btn-boletas" onclick="descargarBoletas()" class="bg-slate-900 hover:bg-slate-800 text-white font-semibold py-2 px-5 rounded-xl text-sm">📥 Generar Boletas (.ZIP)</button>
            </div>
        </section>

        <section class="mt-6 bg-slate-100 rounded-2xl p-5 border border-slate-200">
            <details class="group">
                <summary class="flex justify-between font-semibold text-sm text-slate-500 cursor-pointer list-none"><span>⚙️ Configuración (Carga del Padrón de Alumnos)</span><span>👇</span></summary>
                <div class="mt-4 pt-4 border-t flex gap-2"><input type="file" id="archivo-excel" accept=".xlsx" class="text-xs text-slate-500"><button onclick="cargarAlumnos()" class="bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 px-4 rounded-lg transition-all">Cargar Alumnos</button></div>
            </details>
        </section>
    </div>
    <script src="script.js"></script>
</body>
</html>
