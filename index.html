<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pase de Lista | Agenda Digital</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
    </style>
</head>
<body class="text-slate-800 antialiased min-h-screen pb-12">

    <div class="max-w-2xl mx-auto px-4 pt-8">
        <header class="bg-white rounded-2xl p-6 shadow-sm border border-slate-100 mb-6 text-center sm:text-left">
            <div class="flex flex-col sm:flex-row items-center gap-4">
                <div class="p-3 bg-emerald-50 text-emerald-600 rounded-xl text-3xl">📋</div>
                <div>
                    <h1 class="text-xl font-bold text-slate-900 tracking-tight">Pase de Lista Diario</h1>
                    <p class="text-sm font-medium text-slate-500">Ciclo Escolar 2026 - 2027</p>
                </div>
            </div>
            
            <div class="mt-5 pt-4 border-t border-slate-100 flex flex-col sm:flex-row sm:items-center justify-between gap-2">
                <label for="fecha" class="text-xs font-semibold uppercase tracking-wider text-slate-400">Fecha del Reporte</label>
                <input type="date" id="fecha" required class="w-full sm:w-auto px-3 py-1.5 text-sm font-medium bg-slate-50 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-emerald-500/20 focus:border-emerald-500 transition-all text-slate-700">
            </div>
        </header>

        <main class="space-y-3" id="contenedor-alumnos">
            <div class="bg-white rounded-xl p-8 text-center border border-slate-100 shadow-sm text-slate-400 text-sm">
                <div class="animate-spin inline-block w-6 h-6 border-[3px] border-current border-t-transparent text-emerald-600 rounded-full mb-2" role="status" aria-label="loading"></div>
                <p>Cargando lista de alumnos desde el cerebro de Notion...</p>
            </div>
        </main>

        <footer class="mt-8">
            <button onclick="enviarAsistencia()" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-semibold py-3.5 px-6 rounded-xl shadow-lg shadow-emerald-600/20 hover:shadow-emerald-600/30 active:scale-[0.99] transition-all flex items-center justify-center gap-2 text-base tracking-wide">
                <span>🚀</span> Enviar Reporte a Notion
            </button>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
